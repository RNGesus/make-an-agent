packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@mariozechner/pi-coding-agent": ^0.59.0
  "@tanstack/react-router": ^1.167.4
  "@tanstack/react-start": ^1.166.16
  "@types/node": ^24.12.0
  "@types/react": ^19.2.14
  "@types/react-dom": ^19.2.3
  "@vitejs/plugin-react": ^6.0.1
  react: ^19.2.4
  react-dom: ^19.2.4
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.12
  vite-tsconfig-paths: ^6.1.1
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
